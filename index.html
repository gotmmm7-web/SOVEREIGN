<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN • Moda que Domina</title>
    <style>
        :root { --black: #0a0a0a; --gold: #d4af37; --gray: #1a1a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial,sans-serif; background:var(--black); color:#fff; line-height:1.6; }

        header {
            position:fixed; top:0; width:100%; background:rgba(10,10,10,0.98);
            padding:20px 6%; display:flex; justify-content:space-between; align-items:center;
            z-index:100; border-bottom:1px solid #222;
        }
        .logo { font-size:32px; font-weight:900; letter-spacing:10px; color:var(--gold); }

        /* BANNER IMPOENTE */
        .hero {
            height:100vh; background: linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)), 
            url('https://images.unsplash.com/photo-1551028719-00167b16eac5?w=2000') center/cover;
            display:flex; align-items:center; justify-content:center; text-align:center; position:relative;
        }
        .hero-content h1 {
            font-size:125px; font-weight:900; letter-spacing:25px; color:#d4af37;
            text-shadow: 0 0 80px #d4af37, 0 0 140px rgba(212,175,55,0.6);
            margin-bottom:20px;
        }
        .hero-content p {
            font-size:28px; font-weight:500; letter-spacing:8px; margin-bottom:50px;
        }
        .btn {
            background:var(--gold); color:#000; padding:22px 65px; font-size:20px; font-weight:800;
            text-decoration:none; border-radius:6px; letter-spacing:3px;
        }

        .products { padding:140px 6% 100px; }
        .section-title { font-size:48px; text-align:center; margin-bottom:70px; letter-spacing:8px; }

        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:40px; }
        .card {
            background:var(--gray); border-radius:12px; overflow:hidden; transition:0.4s;
        }
        .card:hover { transform:translateY(-15px); }
        .card img { width:100%; height:420px; object-fit:cover; }
        .card-content { padding:25px; }
        .card h3 { font-size:22px; margin-bottom:8px; }
        .price { color:var(--gold); font-size:26px; font-weight:700; }

        .add-btn {
            background:#222; color:#fff; border:none; padding:15px; width:100%; 
            border-radius:6px; font-weight:600; cursor:pointer; margin-top:12px;
        }
        .add-btn:hover { background:var(--gold); color:#000; }

        /* CARRINHO DE VERDADE */
        .cart {
            position:fixed; top:0; right:-420px; width:420px; height:100vh; background:#111;
            transition:0.4s; z-index:200; overflow-y:auto; box-shadow:-10px 0 30px rgba(0,0,0,0.8);
        }
        .cart.open { right:0; }
        .cart-header {
            padding:25px; background:#1a1a1a; display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0;
        }
        .cart-item {
            padding:20px; border-bottom:1px solid #222; display:flex; gap:15px;
        }
        .cart-item img { width:80px; height:80px; object-fit:cover; border-radius:6px; }
        .cart-total {
            padding:25px; background:#1a1a1a; position:sticky; bottom:0; font-size:24px; text-align:center;
        }

        /* BOTÃO WHATSAPP */
        .whatsapp {
            position:fixed; bottom:30px; left:30px; background:#25D366; width:65px; height:65px;
            border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px;
            box-shadow:0 5px 20px rgba(37,211,102,0.5); z-index:150; text-decoration:none;
        }

        footer {
            background:#0a0a0a; padding:60px 6% 40px; text-align:center; border-top:1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SOVEREIGN</div>
        <nav>
            <a href="#">Novidades</a>
            <a href="#">Masculino</a>
            <a href="#">Feminino</a>
            <a href="#">Acessórios</a>
        </nav>
    </header>

    <!-- BANNER IMPOENTE -->
    <section class="hero">
        <div class="hero-content">
            <h1>SOVEREIGN</h1>
            <p>NÃO É ROUPA. É PODER QUE VOCÊ VESTE.</p>
            <a href="#produtos" class="btn">EXPLORAR COLEÇÃO</a>
        </div>
    </section>

    <section class="products" id="produtos">
        <h2 class="section-title">COLEÇÃO DE PODER</h2>
        <div class="grid" id="product-grid"></div>
    </section>

    <!-- CARRINHO -->
    <div class="cart" id="cart">
        <div class="cart-header">
            <h2>Seu Carrinho</h2>
            <span onclick="toggleCart()" style="font-size:32px;cursor:pointer;">×</span>
        </div>
        <div id="cart-items"></div>
        <div class="cart-total">
            Total: R$ <span id="cart-total">0</span>
        </div>
    </div>

    <!-- BOTÃO WHATSAPP -->
    <a href="https://wa.me/5511999999999" target="_blank" class="whatsapp">💬</a>

    <footer>
        <p style="font-size:28px; color:var(--gold); margin-bottom:20px;">SOVEREIGN</p>
        <p>© 2026 Sovereign Brand. Todos os direitos reservados.</p>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('sovereignCart')) || [];

        const products = [
            {id:1, name:"Jaqueta Sovereign Leather", price:429, img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=800"},
            {id:2, name:"Moletom Oversized Black", price:259, img:"https://images.unsplash.com/photo-1622445275576-721325763afe?w=800"},
            {id:3, name:"Calça Cargo Tactical", price:289, img:"https://images.unsplash.com/photo-1594633313593-bab3825d0caf?w=800"},
            {id:4, name:"Camiseta Power Gold", price:159, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800"},
            {id:5, name:"Boné Structured Crown", price:129, img:"https://images.unsplash.com/photo-1586790170083-2f9ceadc732d?w=800"},
            {id:6, name:"Jaqueta Bomber Premium", price:389, img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=800"}
        ];

        function renderProducts() {
            document.getElementById('product-grid').innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="card-content">
                        <h3>${p.name}</h3>
                        <div class="price">R$ ${p.price}</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">ADICIONAR AO CARRINHO</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            localStorage.setItem('sovereignCart', JSON.stringify(cart));
            updateCart();
            alert(`${product.name} adicionado ao carrinho!`);
        }

        function updateCart() {
            const itemsDiv = document.getElementById('cart-items');
            let total = 0;

            itemsDiv.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div>
                            <h4>${item.name}</h4>
                            <p style="color:var(--gold);">R$ ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background:none;border:none;color:#ff4444;font-size:28px;cursor:pointer;margin-left:auto;">×</button>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total').textContent = total.toFixed(2);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('sovereignCart', JSON.stringify(cart));
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart').classList.toggle('open');
        }

        window.onload = () => {
            renderProducts();
            updateCart();
        };
    </script>
</body>
</html>

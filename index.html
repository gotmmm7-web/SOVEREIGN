<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN • Moda que Domina</title>
    <style>
        :root { --black: #0a0a0a; --gold: #d4af37; --gray: #1a1a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial,sans-serif; background:var(--black); color:#fff; }
        
        header {
            position:fixed; top:0; width:100%; background:rgba(10,10,10,0.98);
            padding:20px 6%; display:flex; justify-content:space-between; align-items:center;
            z-index:100; border-bottom:1px solid #222;
        }
        .logo { font-size:32px; font-weight:900; letter-spacing:10px; color:var(--gold); }
        nav a { color:#ddd; margin:0 20px; text-decoration:none; font-weight:500; }
        nav a:hover { color:var(--gold); }

        .hero {
            height:100vh; background: linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)), 
            url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=2000') center/cover;
            display:flex; align-items:center; justify-content:center; text-align:center;
        }
        .hero h1 { font-size:88px; letter-spacing:15px; margin-bottom:20px; }
        .hero p { font-size:24px; max-width:680px; }

        .products { padding:160px 6% 100px; }
        .section-title { font-size:46px; text-align:center; margin-bottom:60px; letter-spacing:8px; }

        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:40px; }
        .card {
            background:var(--gray); border-radius:12px; overflow:hidden; transition:0.4s;
        }
        .card:hover { transform:translateY(-15px); }
        .card img { width:100%; height:420px; object-fit:cover; }
        .card-content { padding:25px; }
        .card h3 { font-size:22px; margin-bottom:8px; }
        .price { color:var(--gold); font-size:26px; font-weight:700; margin-bottom:15px; }

        .add-btn {
            background:#222; color:#fff; border:none; padding:15px; width:100%; 
            border-radius:6px; font-weight:600; cursor:pointer;
        }
        .add-btn:hover { background:var(--gold); color:#000; }

        .cart-icon {
            position:fixed; bottom:35px; right:35px; background:var(--gold); color:#000;
            width:72px; height:72px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:34px; cursor:pointer; box-shadow:0 10px 30px rgba(212,175,55,0.4);
            z-index:150;
        }
        .cart-count {
            position:absolute; top:-6px; right:-6px; background:#000; color:var(--gold);
            width:26px; height:26px; border-radius:50%; font-size:15px; display:flex;
            align-items:center; justify-content:center; font-weight:bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SOVEREIGN</div>
        <nav>
            <a href="#">Novidades</a>
            <a href="#">Masculino</a>
            <a href="#">Feminino</a>
            <a href="#">Acessórios</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>SOVEREIGN</h1>
            <p>Não é roupa. É poder que você veste.</p>
        </div>
    </section>

    <section class="products" id="produtos">
        <h2 class="section-title">COLEÇÃO DE PODER</h2>
        <div class="grid" id="product-grid"></div>
    </section>

    <div class="cart-icon" onclick="verCarrinho()">
        🛒 <span class="cart-count" id="cart-count">0</span>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('sovereignCart')) || [];

        const products = [
            {id:1, name:"Jaqueta Sovereign Leather", price:429, img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=800"},
            {id:2, name:"Moletom Oversized Black", price:259, img:"https://images.unsplash.com/photo-1622445275576-721325763afe?w=800"},
            {id:3, name:"Calça Cargo Tactical", price:289, img:"https://images.unsplash.com/photo-1594633313593-bab3825d0caf?w=800"},
{id:5, name:"Boné Structured Crown", price:129, img:"https://images.unsplash.com/photo-1622445275576-721325763afe?w=800"},
            
            {id:4, name:"Camiseta Power Gold", price:159, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800"},

        {id:6, name:"Jaqueta Bomber Premium", price:389, img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=800"}
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="card-content">
                        <h3>${p.name}</h3>
                        <div class="price">R$ ${p.price}</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">ADICIONAR AO CARRINHO</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            localStorage.setItem('sovereignCart', JSON.stringify(cart));
            updateCount();
            alert(`${product.name} foi adicionado ao carrinho!`);
        }

        function updateCount() {
            document.getElementById('cart-count').textContent = cart.length;
        }

        function verCarrinho() {
            if (cart.length === 0) {
                alert("Seu carrinho está vazio!");
                return;
            }
            let mensagem = "🛒 Seu Carrinho:\n\n";
            let total = 0;
            cart.forEach((item, i) => {
                mensagem += `${i+1}. ${item.name} - R$ ${item.price}\n`;
                total += item.price;
            });
            mensagem += `\nTotal: R$ ${total}`;
            alert(mensagem);
        }

        window.onload = () => {
            renderProducts();
            updateCount();
        };
    </script>
</body>
</html>

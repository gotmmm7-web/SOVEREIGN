<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN</title>
    <style>
        :root { --black: #0a0a0a; --gold: #d4af37; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family:'Segoe UI', system-ui, sans-serif; 
            background:#0a0a0a; color:#fff; line-height:1.6;
        }
        header {
            position:fixed; top:0; width:100%; background:rgba(10,10,10,0.95);
            padding:20px 6%; display:flex; justify-content:space-between; align-items:center;
            border-bottom:1px solid #222; z-index:100;
        }
        .logo { font-size:28px; font-weight:900; letter-spacing:8px; color:var(--gold); }
        nav a { color:#ddd; margin:0 20px; text-decoration:none; font-weight:500; }
        nav a:hover { color:var(--gold); }

        .hero {
            height:100vh; background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)), 
            url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
            display:flex; align-items:center; justify-content:center; text-align:center;
        }
        .hero-content h1 { font-size:82px; letter-spacing:12px; margin-bottom:16px; }
        .hero-content p { font-size:22px; max-width:620px; margin:0 auto 30px; }
        .btn { 
            background:var(--gold); color:#000; padding:18px 52px; font-size:18px; 
            font-weight:700; text-decoration:none; border-radius:4px;
        }

        .products { padding:140px 6% 100px; }
        .section-title { font-size:44px; text-align:center; margin-bottom:60px; letter-spacing:6px; }

        .grid {
            display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:30px;
        }
        .card {
            background:#111; padding:20px; border-radius:8px; transition:0.3s;
        }
        .card:hover { transform:translateY(-8px); }
        .card img { width:100%; height:320px; object-fit:cover; border-radius:8px; }
        .card h3 { margin:18px 0 8px; font-size:20px; }
        .price { color:var(--gold); font-size:24px; font-weight:700; }

        .add-btn {
            background:#222; color:#fff; border:none; padding:14px; width:100%; 
            margin-top:12px; border-radius:4px; font-weight:600; cursor:pointer;
        }
        .add-btn:hover { background:var(--gold); color:#000; }

        .cart {
            position:fixed; top:0; right:-400px; width:380px; height:100vh; 
            background:#111; transition:0.4s; z-index:200; overflow-y:auto;
            box-shadow:-4px 0 15px rgba(0,0,0,0.6);
        }
        .cart.open { right:0; }
        .cart-header {
            padding:20px; background:#1a1a1a; display:flex; justify-content:space-between;
            align-items:center; position:sticky; top:0;
        }
        .cart-item {
            padding:20px; border-bottom:1px solid #222; display:flex; gap:15px;
        }
        .cart-item img { width:80px; height:80px; object-fit:cover; border-radius:4px; }
        .cart-total {
            padding:20px; background:#1a1a1a; position:sticky; bottom:0;
            font-size:22px; text-align:center;
        }
        .cart-icon {
            position:fixed; bottom:30px; right:30px; background:var(--gold); color:#000;
            width:65px; height:65px; border-radius:50%; display:flex; align-items:center; 
            justify-content:center; font-size:30px; cursor:pointer; box-shadow:0 4px 15px rgba(212,175,55,0.4);
        }
        .count {
            position:absolute; top:-6px; right:-6px; background:#000; color:var(--gold);
            font-size:14px; width:22px; height:22px; border-radius:50%; display:flex;
            align-items:center; justify-content:center; font-weight:bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SOVEREIGN</div>
        <nav>
            <a href="#">Novidades</a>
            <a href="#">Masculino</a>
            <a href="#">Feminino</a>
            <a href="#">Acessórios</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>SOVEREIGN</h1>
            <p>Não é roupa. É poder que você veste.</p>
            <a href="#produtos" class="btn">VER COLEÇÃO</a>
        </div>
    </section>

    <section class="products" id="produtos">
        <h2 class="section-title">COLEÇÃO DE PODER</h2>
        <div class="grid" id="product-grid"></div>
    </section>

    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span class="count" id="cart-count">0</span>
    </div>

    <div class="cart" id="cart">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <span onclick="toggleCart()" style="cursor:pointer;font-size:28px;">×</span>
        </div>
        <div id="cart-items"></div>
        <div class="cart-total">
            Total: R$ <span id="cart-total">0.00</span>
        </div>
    </div>

    <script>
        const products = [
            {id:1, name:"Jaqueta Black Sovereign", price:289.90, img:"https://picsum.photos/id/1015/600/600"},
            {id:2, name:"Camiseta Oversized Gold", price:129.90, img:"https://picsum.photos/id/201/600/600"},
            {id:3, name:"Calça Cargo Imperial", price:199.90, img:"https://picsum.photos/id/301/600/600"},
            {id:4, name:"Moletom Heavyweight", price:219.90, img:"https://picsum.photos/id/401/600/600"},
            {id:5, name:"Boné Structured Crown", price:89.90, img:"https://picsum.photos/id/501/600/600"},
            {id:6, name:"Jaqueta Bomber Leather", price:349.90, img:"https://picsum.photos/id/601/600/600"} ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price">R$ ${p.price.toFixed(2)}</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">ADICIONAR AO CARRINHO</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            alert(`${product.name} foi adicionado ao carrinho`);
        }

        function updateCart() {
            document.getElementById('cart-count').textContent = cart.length;
            
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div>
                        <h4>${item.name}</h4>
                        <p style="color:var(--gold);margin-top:4px;">R$ ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background:none;border:none;color:#fff;cursor:pointer;margin-left:auto;font-size:20px;">×</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').textContent = total.toFixed(2);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart').classList.toggle('open');
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
